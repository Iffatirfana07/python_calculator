name: PR Review Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Statistics
        run: |
          echo "FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD | wc -l)" >> $GITHUB_ENV

          STATS=$(git diff --shortstat HEAD~1 HEAD)

          ADDED=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | awk '{print $1}')
          REMOVED=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | awk '{print $1}')

          echo "LINES_ADDED=${ADDED:-0}" >> $GITHUB_ENV
          echo "LINES_REMOVED=${REMOVED:-0}" >> $GITHUB_ENV

          git diff --stat HEAD~1 HEAD > diff.txt

      - name: Find TODO and FIXME
        run: |
          grep -RniE "TODO|FIXME" . > debt.txt || true

      - name: Create Summary
        run: |
          {
            echo "## Automated Code Review Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Files Changed | $FILES_CHANGED |"
            echo "| Lines Added | $LINES_ADDED |"
            echo "| Lines Removed | $LINES_REMOVED |"
            echo ""
            echo "### Diff Statistics"
            echo '```'
            cat diff.txt
            echo '```'
            echo ""
            echo "### TODO / FIXME Analysis"
            echo '```'
            cat debt.txt
            echo '```'
          } > summary.md

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('summary.md', 'utf8');

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
